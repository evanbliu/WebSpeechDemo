<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Speech API Playground</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="column">
            <h2>Options</h2>
            <div class="option-group">
                <label for="lang-input">Language (e.g., "en-US", "es-ES")</label>
                <input type="text" id="lang-input" value="en-US">
            </div>
            <div class="option-group">
                <label for="process-locally-check">
                    <input type="checkbox" id="process-locally-check"> Process Locally
                </label>
            </div>
            <div class="option-group">
                <label for="quality-select">Quality</label>
                <select id="quality-select">
                    <option value=""></option>
                    <option value="command">command</option>
                    <option value="dictation">dictation</option>
                    <option value="conversation">conversation</option>
                </select>
            </div>

            <div class="option-group">
                <label>Contextual Biasing Phrases</label>
                <p class="description">Add phrases and a boost value (0.1-20.0) to increase their recognition probability.</p>
                <div id="phrases-container">
                    <!-- Phrase rows will be added here dynamically -->
                </div>
                <button id="add-phrase-btn" class="add-btn">+</button>
            </div>

            <h2>On-device</h2>
            <p>Manage on-device speech models for local processing.</p>
            <div class="button-group on-device-buttons">
                <button id="check-availability-btn">Check Availability</button>
                <button id="install-btn">Install</button>
            </div>

            <h2>Audio Source</h2>
            <p>Use this audio file as the speech input source.</p>
            <audio id="audio-source" src="recognition_audio.mp3" controls></audio>

            <h2>Execute</h2>
            <button id="start-btn">Start Recognition</button>
            <button id="stop-btn" disabled>Stop Recognition</button>

            <h2>Status</h2>
            <p id="status-display">Ready</p>
        </div>

        <div class="column">
            <h2>Results</h2>
            <div id="results-container">
                <!-- Recognition results will be displayed here -->
            </div>
            <button id="clear-btn">Clear Results</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
